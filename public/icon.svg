<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect x="0" y="0" width="512" height="512" rx="102" fill="url(#bg)"/>
  <!-- Glow effect -->
  <rect x="41" y="41" width="430" height="430" rx="52" fill="url(#glow)"/>
  <!-- Terminal window frame -->
  <rect x="41" y="41" width="430" height="430" rx="52" fill="none" stroke="#00ff88" stroke-width="8" stroke-opacity="0.6"/>
  <!-- Title bar dots -->
  <circle cx="75.4" cy="75.4" r="9" fill="#ff5f57"/>
  <circle cx="101.2" cy="75.4" r="9" fill="#febc2e"/>
  <circle cx="127" cy="75.4" r="9" fill="#28c840"/>
  <!-- Prompt line -->
  <text x="92.6" y="264.6" font-family="monospace, Courier, sans-serif" font-size="72" fill="#00ff88" font-weight="bold">$</text>
  <text x="135.6" y="264.6" font-family="monospace, Courier, sans-serif" font-size="72" fill="#cccccc">mirage</text>
  <!-- Cursor blink -->
  <rect x="307.6" y="204.4" width="13" height="31" rx="1" fill="#00ff88" opacity="0.8">
    <!-- <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Second line: command output -->
  <text x="92.6" y="342" font-family="monospace, Courier, sans-serif" font-size="61" fill="#888888">ready</text>
  <text x="277.5" y="342" font-family="monospace, Courier, sans-serif" font-size="61" fill="#00ff88" opacity="0.7">✦</text>
</svg>